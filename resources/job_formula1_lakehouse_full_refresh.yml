resources:
  jobs:
    job_formula1_lakehouse_full_refresh:
      name: job_formula1_lakehouse_full_refresh
      max_concurrent_runs: 1
      queue:
        enabled: true
      job_clusters:
        - job_cluster_key: Job_cluster
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: Standard_D4s_v3
            azure_attributes:
              first_on_demand: 1
              spot_bid_max_price: -1
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            data_security_mode: DATA_SECURITY_MODE_DEDICATED
            runtime_engine: STANDARD
            is_single_node: true
      tasks:
        - task_key: 01_ingest_circuits_file
          job_cluster_key: Job_cluster
          notebook_task:
            notebook_path: ./formula1-project/02-bronze/01.Ingest Circuits File
            source: WORKSPACE
        - task_key: 01_transform_circuits_data
          job_cluster_key: Job_cluster
          depends_on:
            - task_key: 01_ingest_circuits_file
          notebook_task:
            notebook_path: ./formula1-project/03-silver/01.Transform Circuits Data
            source: WORKSPACE
